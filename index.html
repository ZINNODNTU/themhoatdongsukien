<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Event Parser Pro</title>
    <!-- CSS: Bootstrap 5 & Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        body { 
            background-color: var(--bg-body); 
            font-family: 'Inter', sans-serif; 
            color: #1e293b;
        }

        .navbar-brand { font-weight: 800; letter-spacing: -1px; color: var(--primary) !important; }
        
        .glass-card {
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
        }

        .section-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #334155;
        }

        .form-label { 
            font-weight: 600; 
            color: #64748b; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            margin-bottom: 6px;
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding: 10px 14px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-ai {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            padding: 14px;
            transition: all 0.3s;
        }

        .btn-ai:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            color: white;
        }

        .btn-save {
            background: #10b981;
            color: white;
            border-radius: 10px;
            padding: 14px;
            font-weight: 700;
        }

        .btn-save:hover {
            background: #059669;
            color: white;
        }

        .badge-status {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .floating-config {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        /* Loading Animation */
        .ai-pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(79, 70, 229, 0.4); }
            100% { box-shadow: 0 0 0 15px rgba(79, 70, 229, 0); }
        }
        
        .table-hover tbody tr:hover {
            background-color: #f8fafc;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="fa-solid fa-brain me-2"></i>EVENT PARSER <span class="text-muted fw-light">v2.0</span>
        </a>
        <div class="d-flex align-items-center">
            <span id="methodBadge" class="badge bg-light text-dark border badge-status">
                <i class="fa-solid fa-circle-info me-1"></i> Sẵn sàng
            </span>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <!-- DANH SÁCH DỮ LIỆU -->
    <div class="glass-card p-4 mb-4">
        <div class="section-title justify-content-between">
            <span><i class="fa-solid fa-list-check"></i> Danh sách hoạt động</span>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-primary" onclick="taiDuLieu()">
                    <i class="fa-solid fa-rotate me-1"></i> Tải lại
                </button>
                <select id="filterStatus" class="form-select form-select-sm" style="width: auto;" onchange="locDuLieu()">
                    <option value="all">Tất cả</option>
                    <option value="còn" selected>Còn hạn</option>
                    <option value="ngưng">Ngưng nhận</option>
                </select>
            </div>
        </div>
        
        <div id="loadingList" class="text-center py-4" style="display:none;">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="text-muted mt-2">Đang tải dữ liệu...</p>
        </div>
        
        <div id="dataList" class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th style="width: 40px;">STT</th>
                        <th>Tên chương trình</th>
                        <th style="width: 150px;">Thời gian</th>
                        <th style="width: 120px;">Hạn đăng ký</th>
                        <th style="width: 100px;">Trạng thái</th>
                        <th style="width: 100px;">Loại</th>
                        <th style="width: 120px;">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="7" class="text-center text-muted py-4">
                            Nhấn "Tải lại" để xem dữ liệu
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="row g-4">
        <!-- CỘT TRÁI: INPUT -->
        <div class="col-lg-4">
            <div class="glass-card p-4">
                <div class="floating-config">
                    <label class="form-label text-primary"><i class="fa-solid fa-key me-1"></i> Gemini API Key</label>
                    <input type="password" id="apiKey" class="form-control form-control-sm" placeholder="Dán API key vào đây..." autocomplete="current-password">
                </div>

                <div class="section-title">
                    <i class="fa-solid fa-pen-to-square"></i> Nội dung gốc
                </div>
                
                <textarea id="inputText" class="form-control mb-3" style="height: 400px;" 
                    placeholder="Dán tin nhắn từ Zalo, Messenger, Email..."></textarea>
                
                <button class="btn btn-ai w-100" onclick="phanTichVoiAI()" id="btnAI">
                    <i class="fa-solid fa-wand-magic-sparkles me-2"></i> PHÂN TÍCH THÔNG MINH
                </button>

                <div id="loading" class="text-center mt-3" style="display:none;">
                    <div class="spinner-border text-primary spinner-border-sm" role="status"></div>
                    <span class="ms-2 text-muted small">AI đang đọc dữ liệu...</span>
                </div>
            </div>
        </div>

        <!-- CỘT PHẢI: RESULT -->
        <div class="col-lg-8">
            <div class="glass-card p-4 h-100">
                <div class="section-title justify-content-between">
                    <span><i class="fa-solid fa-table-list"></i> Dữ liệu trích xuất</span>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary border-0 me-2" onclick="clearForm()">Xóa form</button>
                        <span id="editingBadge" class="badge bg-warning text-dark" style="display:none;">
                            <i class="fa-solid fa-pen me-1"></i> Đang sửa
                        </span>
                    </div>
                </div>
                
                <input type="hidden" id="editingSTT" value="">

                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Tên chương trình / Hoạt động</label>
                        <input type="text" id="res_ten" class="form-control fw-bold text-primary">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Thời gian tổ chức</label>
                        <textarea id="res_thoigian" class="form-control" rows="2" placeholder="Ngày, giờ..."></textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Địa điểm</label>
                        <textarea id="res_diadiem" class="form-control" rows="2" placeholder="Trực tiếp hoặc Online..."></textarea>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Số lượng</label>
                        <input type="text" id="res_soluong" class="form-control" placeholder="Ví dụ: 100 SV">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Hạn đăng ký</label>
                        <input type="text" id="res_han" class="form-control border-danger-subtle" placeholder="DD/MM/YYYY">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Trang phục</label>
                        <input type="text" id="res_trangphuc" class="form-control">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Quyền lợi (CTXH, quà tặng...)</label>
                        <input type="text" id="res_quyenloi" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-success">Link đăng ký (Form)</label>
                        <input type="text" id="res_link" class="form-control border-success-subtle">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Link nhóm hỗ trợ (Zalo/FB)</label>
                        <input type="text" id="res_linknhom" class="form-control">
                    </div>

                    <!-- ĐƠN VỊ PHỤ TRÁCH: NHẬP HOẶC CHỌN -->
                    <div class="col-md-4">
                        <label class="form-label">Đơn vị phụ trách</label>
                        <input list="donvi-list" id="res_donvi" class="form-control" placeholder="Chọn hoặc tự nhập...">
                        <datalist id="donvi-list">
                            <option value="KHOA CNTT-TT">
                            <option value="ĐOÀN THANH NIÊN">
                            <option value="HỘI SINH VIÊN">
                            <option value="LIÊN CHI ĐOÀN">
                            <option value="P.CTSV">
                            <option value="Tỉnh Đoàn">
                            <option value="Hội Sinh viên Tỉnh">
                        </datalist>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Phân loại</label>
                        <select id="res_loai" class="form-select">
                            <option value="HOẠT ĐỘNG">HOẠT ĐỘNG</option>
                            <option value="CUỘC THI">CUỘC THI</option>
                            <option value="WORKSHOP">WORKSHOP</option>
                            <option value="TÌNH NGUYỆN">TÌNH NGUYỆN</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Trạng thái</label>
                        <select id="res_trangthai" class="form-select">
                            <option value="còn">Còn hạn đăng ký</option>
                            <option value="ngưng">Ngưng nhận</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Ghi chú quan trọng</label>
                        <textarea id="res_ghichu" class="form-control" rows="2"></textarea>
                    </div>
                </div>

                <div class="mt-4 pt-3 border-top">
                    <button class="btn btn-save w-100 shadow-sm" onclick="guiLenSheet()" id="btnSave">
                        <i class="fa-solid fa-cloud-arrow-up me-2"></i> <span id="btnSaveText">LƯU VÀO GOOGLE SHEET</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Biến toàn cục
let allData = [];
const SHEET_URL = "https://opensheet.elk.sh/1bIoZD9x1DbtonKqhRqVf_oDGEwyiQTYzlAgG8Bi0vX4/TONGHOP";

// Tải API Key từ LocalStorage và dữ liệu
window.onload = function() {
    const savedKey = localStorage.getItem("gemini_api_key");
    if (savedKey) document.getElementById("apiKey").value = savedKey;
    taiDuLieu();
};

// Tải dữ liệu từ Google Sheet
async function taiDuLieu() {
    const loader = document.getElementById("loadingList");
    const tbody = document.getElementById("tableBody");
    
    loader.style.display = "block";
    tbody.innerHTML = "";
    
    try {
        const response = await fetch(SHEET_URL);
        allData = await response.json();
        locDuLieu();
    } catch (error) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-danger py-4">
            <i class="fa-solid fa-triangle-exclamation me-2"></i>Lỗi tải dữ liệu: ${error.message}
        </td></tr>`;
    } finally {
        loader.style.display = "none";
    }
}

// Lọc và hiển thị dữ liệu
function locDuLieu() {
    const filter = document.getElementById("filterStatus").value;
    const tbody = document.getElementById("tableBody");
    
    let filtered = allData;
    if (filter !== "all") {
        filtered = allData.filter(item => item["Trạng thái"] === filter);
    }
    
    // Sắp xếp: "còn" lên trước
    filtered.sort((a, b) => {
        if (a["Trạng thái"] === "còn" && b["Trạng thái"] !== "còn") return -1;
        if (a["Trạng thái"] !== "còn" && b["Trạng thái"] === "còn") return 1;
        return 0;
    });
    
    if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">
            Không có dữ liệu
        </td></tr>`;
        return;
    }
    
    tbody.innerHTML = filtered.map((item, index) => {
        const statusClass = item["Trạng thái"] === "còn" ? "bg-success" : "bg-secondary";
        const loaiClass = {
            "HOẠT ĐỘNG": "bg-primary",
            "CUỘC THI": "bg-warning text-dark",
            "WORKSHOP": "bg-info",
            "TÌNH NGUYỆN": "bg-danger"
        }[item["Loại"]] || "bg-secondary";
        
        return `
            <tr>
                <td class="fw-bold text-muted">${item.STT || ""}</td>
                <td>
                    <div class="fw-semibold">${item["Tên chương trình"] || ""}</div>
                    <small class="text-muted">${item["Đơn vị phụ trách"] || ""}</small>
                </td>
                <td><small>${item["Thời gian"] || ""}</small></td>
                <td><small class="text-danger fw-semibold">${item["Hạn đăng ký"] || "-"}</small></td>
                <td><span class="badge ${statusClass}">${item["Trạng thái"] || ""}</span></td>
                <td><span class="badge ${loaiClass}">${item["Loại"] || ""}</span></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="suaDuLieu(${index})" title="Sửa">
                        <i class="fa-solid fa-pen"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="xoaDuLieu('${item.STT || ""}')" title="Xóa">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </td>
            </tr>
        `;
    }).join("");
}

// Sửa dữ liệu
function suaDuLieu(index) {
    const filter = document.getElementById("filterStatus").value;
    let filtered = allData;
    if (filter !== "all") {
        filtered = allData.filter(item => item["Trạng thái"] === filter);
    }
    
    // Sắp xếp giống như trong locDuLieu
    filtered.sort((a, b) => {
        if (a["Trạng thái"] === "còn" && b["Trạng thái"] !== "còn") return -1;
        if (a["Trạng thái"] !== "còn" && b["Trạng thái"] === "còn") return 1;
        return 0;
    });
    
    const item = filtered[index];
    if (!item) return;
    
    document.getElementById("res_ten").value = item["Tên chương trình"] || "";
    document.getElementById("res_thoigian").value = item["Thời gian"] || "";
    document.getElementById("res_diadiem").value = item["Địa điểm"] || "";
    document.getElementById("res_soluong").value = item["Số lượng"] || "";
    document.getElementById("res_trangphuc").value = item["Trang phục"] || "";
    document.getElementById("res_han").value = item["Hạn đăng ký"] || "";
    document.getElementById("res_quyenloi").value = item["Quyền lợi"] || "";
    document.getElementById("res_link").value = item["Link đăng ký"] || "";
    document.getElementById("res_linknhom").value = item["Link nhóm"] || "";
    document.getElementById("res_donvi").value = item["Đơn vị phụ trách"] || "";
    document.getElementById("res_trangthai").value = item["Trạng thái"] || "còn";
    document.getElementById("res_loai").value = item["Loại"] || "HOẠT ĐỘNG";
    
    // Đánh dấu đang sửa
    document.getElementById("editingSTT").value = item.STT || "";
    document.getElementById("editingBadge").style.display = "inline-block";
    
    const btnSaveText = document.getElementById("btnSaveText");
    if (btnSaveText) {
        btnSaveText.textContent = "CẬP NHẬT DỮ LIỆU";
    }
    
    // Scroll xuống form
    document.getElementById("res_ten").scrollIntoView({ behavior: "smooth", block: "center" });
}

// Xóa dữ liệu
async function xoaDuLieu(stt) {
    if (!confirm(`Bạn có chắc muốn xóa hoạt động STT ${stt}?`)) return;
    
    const API_URL = "https://script.google.com/macros/s/AKfycbzvlmB6kLjRRkDqf1xzi6Y8pu8mjpl6q3RcU2KN1_5txxQaiK3lUtygoGI-TR4AfkGD/exec";
    
    try {
        await fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ action: "delete", stt: stt })
        });
        alert("✅ Đã xóa thành công!");
        taiDuLieu();
    } catch (e) {
        alert("Lỗi khi xóa: " + e.message);
    }
}

async function phanTichVoiAI() {
    const key = document.getElementById("apiKey").value.trim();
    const text = document.getElementById("inputText").value.trim();

    if (!key || !text) { 
        alert("Vui lòng nhập API Key và Nội dung thông báo!"); 
        return; 
    }

    localStorage.setItem("gemini_api_key", key);
    
    const btn = document.getElementById("btnAI");
    const loader = document.getElementById("loading");
    
    btn.disabled = true;
    btn.classList.add("ai-pulse");
    loader.style.display = "block";

    // Sử dụng Model 1.5 Flash cho tốc độ nhanh và chính xác
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

    const prompt = `Bạn là trợ lý hành chính. Hãy trích xuất dữ liệu từ văn bản sau sang định dạng JSON. 
    Lưu ý: 
    - "han" (hạn đăng ký) định dạng DD/MM/YYYY. 
    - "loai" chọn 1 trong (HOẠT ĐỘNG, CUỘC THI, WORKSHOP, TÌNH NGUYỆN).
    - Nếu không thấy trường nào hãy để trống "".
    - Trả về DUY NHẤT 1 khối JSON, không kèm giải thích.
    
    Cấu trúc: {"ten":"", "thoigian":"", "diadiem":"", "soluong":"", "trangphuc":"", "quyenloi":"", "han":"", "link":"", "loai":"", "ghichu":"", "donvi":""}
    
    Nội dung: ${text}`;

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        let aiText = data.candidates[0].content.parts[0].text;
        const jsonMatch = aiText.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error("AI không thể tạo cấu trúc JSON.");
        
        const res = JSON.parse(jsonMatch[0]);

        // Đổ dữ liệu vào input
        document.getElementById("res_ten").value = res.ten || "";
        document.getElementById("res_thoigian").value = res.thoigian || "";
        document.getElementById("res_diadiem").value = res.diadiem || "";
        document.getElementById("res_soluong").value = res.soluong || "";
        document.getElementById("res_trangphuc").value = res.trangphuc || "";
        document.getElementById("res_han").value = res.han || "";
        document.getElementById("res_quyenloi").value = res.quyenloi || "";
        document.getElementById("res_link").value = res.link || "";
        document.getElementById("res_loai").value = (res.loai || "HOẠT ĐỘNG").toUpperCase();
        document.getElementById("res_ghichu").value = res.ghichu || "";
        document.getElementById("res_donvi").value = res.donvi || "";
        
        const badge = document.getElementById("methodBadge");
        badge.innerHTML = '<i class="fa-solid fa-circle-check me-1"></i> Thành công';
        badge.className = "badge bg-success-subtle text-success border border-success badge-status";

    } catch (error) {
        alert("Lỗi AI: " + error.message);
        console.error(error);
    } finally {
        loader.style.display = "none";
        btn.disabled = false;
        btn.classList.remove("ai-pulse");
    }
}

async function guiLenSheet() {
    const API_URL = "https://script.google.com/macros/s/AKfycbzvlmB6kLjRRkDqf1xzi6Y8pu8mjpl6q3RcU2KN1_5txxQaiK3lUtygoGI-TR4AfkGD/exec"; 

    const editingSTT = document.getElementById("editingSTT").value;
    
    const payload = {
        action: editingSTT ? "update" : "add",
        stt: editingSTT,
        ten: document.getElementById("res_ten").value,
        thoigian: document.getElementById("res_thoigian").value,
        diadiem: document.getElementById("res_diadiem").value,
        trangphuc: document.getElementById("res_trangphuc").value,
        soluong: document.getElementById("res_soluong").value,
        quyenloi: document.getElementById("res_quyenloi").value,
        han: document.getElementById("res_han").value,
        link: document.getElementById("res_link").value,
        linknhom: document.getElementById("res_linknhom").value,
        donvi: document.getElementById("res_donvi").value, 
        trangthai: document.getElementById("res_trangthai").value,
        loai: document.getElementById("res_loai").value,
        ghichu: document.getElementById("res_ghichu").value
    };

    const btn = document.getElementById("btnSave");
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> ĐANG LƯU...';

    try {
        await fetch(API_URL, {
            method: "POST",
            mode: "no-cors", 
            body: JSON.stringify(payload)
        });
        
        const message = editingSTT ? "✅ Cập nhật thành công!" : "🎉 Tuyệt vời! Dữ liệu đã được lưu thành công.";
        alert(message);
        
        clearForm();
        taiDuLieu();
    } catch (e) {
        alert("Lỗi kết nối: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}

function clearForm() {
    if(confirm("Bạn có chắc muốn xóa sạch kết quả hiện tại?")) {
        const inputs = document.querySelectorAll('#res_ten, #res_thoigian, #res_diadiem, #res_soluong, #res_han, #res_trangphuc, #res_quyenloi, #res_link, #res_linknhom, #res_donvi, #res_ghichu');
        inputs.forEach(i => i.value = "");
        
        // Reset trạng thái sửa
        document.getElementById("editingSTT").value = "";
        document.getElementById("editingBadge").style.display = "none";
        
        const btnSaveText = document.getElementById("btnSaveText");
        if (btnSaveText) {
            btnSaveText.textContent = "LƯU VÀO GOOGLE SHEET";
        }
    }
}
</script>
